name: Flow
options:
  bundleIdPrefix: com.flow
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Flow:
    type: application
    platform: macOS
    sources:
      - path: Flow/Sources
    resources:
      - path: Flow/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.flow.app
        INFOPLIST_FILE: Flow/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Flow/Flow.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: true
    postBuildScripts:
      - script: |
          if command -v swiftlint &> /dev/null; then
            swiftlint lint --config "${SRCROOT}/.swiftlint.yml" "${SRCROOT}/Flow/Sources"
          else
            echo "warning: SwiftLint not installed. Run 'make setup' to install."
          fi
        name: SwiftLint

  FlowTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: FlowTests
    dependencies:
      - target: Flow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.flow.app.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Flow.app/Contents/MacOS/Flow"
        BUNDLE_LOADER: "$(TEST_HOST)"
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Flow:
    build:
      targets:
        Flow: all
        FlowTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      coverageTargets:
        - Flow
      targets:
        - FlowTests
